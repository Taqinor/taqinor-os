<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAQINOR — Connexion</title>
    <link rel="stylesheet" href="/simulator/static/css/style.css">
    <style>
        body { background: linear-gradient(135deg, #073d57 0%, #0A5275 50%, #1a7aad 100%); }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <span class="logo-sun">☀️</span>
            <span class="logo-text">TAQINOR</span>
            <p class="logo-sub">Simulateur de Devis Solaire</p>
        </div>

        <h2 class="login-title">Connexion</h2>

        <div id="login-error"></div>

        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" class="form-control"
                       placeholder="Entrez votre identifiant"
                       autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" class="form-control"
                       placeholder="Entrez votre mot de passe"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary login-btn">
                Se connecter
            </button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#999;">
            TAQINOR &copy; 2025 — Système de gestion de devis solaires
        </p>
    </div>
</div>

<script>
    // Redirect if already logged in
    const token = localStorage.getItem('taqinor_token');
    if (token) {
        window.location.href = '/simulator/';
    }

    async function doLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        errorEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connexion...';

        try {
            const res = await fetch('/simulator/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.detail || 'Identifiants incorrects');
            }

            const data = await res.json();
            localStorage.setItem('taqinor_token', data.access_token);
            localStorage.setItem('taqinor_user', JSON.stringify(data.user));
            window.location.href = '/simulator/';
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Se connecter';
        }
    }
</script>
</body>
</html>
