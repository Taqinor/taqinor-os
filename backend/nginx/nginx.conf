worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Buffers d'en-tête de réponse upstream. Le cookie JWT d'authentification
    # embarque la LISTE COMPLÈTE des permissions du rôle (claim `permissions`) :
    # pour un rôle admin/directeur (~65 permissions, encore élargi par l'ajout
    # des permissions adsengine/qhse/projet/contrat/litige/kb), l'en-tête
    # Set-Cookie dépasse le buffer par défaut (~8k) et nginx rejette la réponse
    # d'un login RÉUSSI avec « upstream sent too big header » → 502 (l'utilisateur
    # voit « Erreur serveur » alors que son mot de passe est bon). On dimensionne
    # les buffers d'en-tête pour absorber le jeton et sa croissance future.
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    sendfile on;
    keepalive_timeout 65;

    # Fichiers OCR jusqu'a 15 Mo
    client_max_body_size 15m;

    # ── SCA12 — compression gzip ──────────────────────────────────────────────
    # Avant SCA12 : zero directive gzip (grep verifie). Active pour les
    # reponses JSON/JS/CSS/SVG (les payloads texte dominants de cette API +
    # du frontend statique servi via /static/), niveau MODERE (5, sur une
    # echelle 1-9) pour equilibrer CPU nginx vs gain de bande passante.
    #
    # Risque de double-compression VERIFIE (2026-07-09) : backend/caddy/
    # Caddyfile pose deja `encode gzip` en amont (Caddy termine le TLS public
    # et proxifie vers nginx). Le module encode de Caddy (caddyhttp/encode)
    # verifie le header Content-Encoding de la reponse AMONT avant d'encoder
    # — si nginx a deja compresse (Content-Encoding: gzip present), Caddy ne
    # recompresse PAS une seconde fois, il relaie tel quel. Aucun risque de
    # double gzip : soit nginx compresse au plus pres de la source (reduit
    # aussi la bande passante interne nginx->Caddy), soit un cas limite fait
    # qu'aucun des deux ne compresse — jamais les deux a la fois.
    gzip on;
    gzip_types application/json application/javascript text/css image/svg+xml;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_vary on;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register_limit:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=1r/m;
    # VX202 — zone dediee aux endpoints publics tokenises (depot/signature GED,
    # suivi ticket SAV, reservation RDV, signalement equipement) : avant VX202,
    # SEULS login/contact/register avaient une garde dediee — ces endpoints
    # ANONYMES accessibles par un token devinable/en rafale n'avaient que le
    # api_limit generique (30 r/s, bien trop permissif pour une re-soumission).
    limit_req_zone $binary_remote_addr zone=public_token_limit:10m rate=10r/m;

    # ── Upstream Django ───────────────────────────────────────────────────────
    upstream django_backend {
        server django_core:8000;
    }

    # ── Upstream FastAPI ──────────────────────────────────────────────────────
    upstream fastapi_backend {
        server fastapi_ia:8001;
    }

    # ── Upstream Frontend statique ────────────────────────────────────────────
    upstream frontend_backend {
        server frontend:80;
    }

    # ── Écouteur PUBLIC minimal (tunnel sortant) ──────────────────────────────
    # Exposé sur internet via cloudflared : SEUL le webhook leads du site y
    # répond ; tout le reste est 404. Ne jamais y router d'autres chemins.
    server {
        listen 8090;
        server_name _;

        location = /api/django/crm/webhooks/website-leads/ {
            limit_req zone=contact_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            # Host épinglé : l'hôte public du tunnel tourne, ALLOWED_HOSTS
            # de Django n'a pas à le connaître — ce listener ne sert qu'un
            # seul chemin, jamais de contenu dépendant de l'hôte.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Headers de securite ───────────────────────────────────────────────
        # VX200 — CSP/HSTS PAR ENVIRONNEMENT : fragment GENERE par
        # docker-entrypoint.sh (backend/nginx/Dockerfile) depuis
        # security-headers.conf.template. L'origine MinIO reelle
        # (MINIO_PUBLIC_ORIGIN, docker-compose.prod.yml) y remplace le defaut
        # dev http://localhost:9000 — avant VX200 il etait fige EN DUR ici.
        # HSTS est desormais toujours emis (Caddy termine deja le TLS public
        # en prod ; un navigateur l'ignore sur une reponse HTTP simple, donc
        # c'est sans danger en dev).
        include /etc/nginx/generated/security-headers.conf;

        # Cache API : no-store pour les donnees sensibles
        add_header Cache-Control "no-store" always;

        # ── Formulaire contact landing : rate limit anti-spam ─────────────────
        location /api/django/contact/ {
            limit_req zone=contact_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Login : rate limit strict ──────────────────────────────────────────
        location /api/django/token/ {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Inscription entreprise : rate limit ────────────────────────────────
        location /api/django/auth/register-company/ {
            limit_req zone=register_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Pages publiques tokenisees : rate-limit dedie (VX202) ─────────────
        # Un prefixe LOCATION par endpoint public anonyme (depot/signature GED,
        # suivi ticket SAV, reservation RDV, signalement equipement) — chacun
        # est un prefixe PLUS LONG que /api/django/ plus bas, donc nginx le
        # choisit toujours en priorite (plus-long-prefixe-gagne), quel que soit
        # l'ordre dans ce fichier.
        location /api/django/ged/depot/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/django/ged/signature/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/django/ged/signataire/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/django/public/sav/ticket/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/django/public/sav/equipement/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/django/crm/public/booking/ {
            limit_req zone=public_token_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Agent SQL : timeout long (inference LLM) ──────────────────────────
        location /api/fastapi/sql-agent/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── FastAPI (OCR, autres endpoints) ───────────────────────────────────
        location /api/fastapi/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        # ── Django REST API ────────────────────────────────────────────────────
        # SCA12 — proxy_read_timeout alignee sur gunicorn --timeout 120
        # (docker-compose.prod.yml) : avant SCA12, nginx tombait sur son
        # defaut (60s) < gunicorn (120s) — une requete Django legitimement
        # longue (ex. /proposal lent, un export volumineux) pouvait recevoir
        # un 504 nginx AVANT que gunicorn n'ait eu le temps d'echouer
        # proprement. /proposal est servi PAR /api/django/ (regle #4 CLAUDE.md
        # — le moteur premium n'est pas touche, seul ce proxy change) et
        # herite donc du meme nouveau timeout. Rate-limit (limit_req)
        # inchange.
        location /api/django/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── Fichiers statiques Django (admin, etc.) ────────────────────────────
        location /static/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Frontend React (statique) — doit etre en dernier ──────────────────
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}
