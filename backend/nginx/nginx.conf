worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Fichiers OCR jusqu'à 15 Mo (le service accepte 10 Mo)
    client_max_body_size 15m;

    server {
        listen 80;
        server_name localhost;

        # Use Docker's internal resolver so upstream IPs are re-resolved
        # after container restarts instead of being cached at nginx startup.
        resolver 127.0.0.11 valid=10s ipv6=off;

        location /api/django/ {
            set $django_upstream http://django_core:8000;
            proxy_pass $django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            set $django_upstream http://django_core:8000;
            proxy_pass $django_upstream;
            proxy_set_header Host $host;
        }

        # Agent SQL — timeout long (chargement modele + inference LLM)
        location /api/fastapi/sql-agent/ {
            set $fastapi_upstream http://fastapi_ia:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        location /api/fastapi/ {
            set $fastapi_upstream http://fastapi_ia:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts longs pour les requêtes OCR (analyse IA ~30-60s)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;

            # WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }
    }
}
