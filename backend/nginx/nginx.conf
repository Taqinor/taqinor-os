worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Fichiers OCR jusqu'a 15 Mo
    client_max_body_size 15m;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register_limit:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=1r/m;

    # ── Upstream Django ───────────────────────────────────────────────────────
    upstream django_backend {
        server django_core:8000;
    }

    # ── Upstream FastAPI ──────────────────────────────────────────────────────
    upstream fastapi_backend {
        server fastapi_ia:8001;
    }

    # ── Upstream Frontend statique ────────────────────────────────────────────
    upstream frontend_backend {
        server frontend:80;
    }

    # ── Écouteur PUBLIC minimal (tunnel sortant) ──────────────────────────────
    # Exposé sur internet via cloudflared : SEUL le webhook leads du site y
    # répond ; tout le reste est 404. Ne jamais y router d'autres chemins.
    server {
        listen 8090;
        server_name _;

        location = /api/django/crm/webhooks/website-leads/ {
            limit_req zone=contact_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            # Host épinglé : l'hôte public du tunnel tourne, ALLOWED_HOSTS
            # de Django n'a pas à le connaître — ce listener ne sert qu'un
            # seul chemin, jamais de contenu dépendant de l'hôte.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Headers de securite ───────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: http://localhost:9000; connect-src 'self' http://localhost:9000; frame-src 'self' http://localhost:9000; object-src 'self' http://localhost:9000; frame-ancestors 'self';" always;
        # Decommenter en production HTTPS :
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Cache API : no-store pour les donnees sensibles
        add_header Cache-Control "no-store" always;

        # ── Formulaire contact landing : rate limit anti-spam ─────────────────
        location /api/django/contact/ {
            limit_req zone=contact_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Login : rate limit strict ──────────────────────────────────────────
        location /api/django/token/ {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Inscription entreprise : rate limit ────────────────────────────────
        location /api/django/auth/register-company/ {
            limit_req zone=register_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Agent SQL : timeout long (inference LLM) ──────────────────────────
        location /api/fastapi/sql-agent/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── FastAPI (OCR, autres endpoints) ───────────────────────────────────
        location /api/fastapi/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        # ── Django REST API ────────────────────────────────────────────────────
        location /api/django/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Fichiers statiques Django (admin, etc.) ────────────────────────────
        location /static/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Frontend React (statique) — doit etre en dernier ──────────────────
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}
