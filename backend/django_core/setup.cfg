[mutmut]
# YTEST9 — mutation testing targets ONLY the highest-risk, most-consequential
# modules (never the whole repo — mutmut is O(mutants x full test run), a
# repo-wide sweep would never finish and would gate nothing usefully).
# Run manually / via the nightly workflow (.github/workflows/mutation.yml),
# NEVER as a per-commit gate. Triage of surviving mutants: docs/testing.md.
paths_to_mutate=
    apps/ventes/quote_engine/builder.py,
    apps/ventes/utils/references.py,
    apps/roles/models.py
tests_dir=
    apps/ventes/tests/,
    apps/roles/
runner=python manage.py test apps.ventes.tests.test_references apps.ventes.tests.test_quote_engine apps.roles.tests --exclude-tag=pdf --exclude-tag=slow
