# SCA11 — postgresql.conf tune, monte en lecture seule sur le conteneur `db`
# (docker-compose.yml + docker-compose.prod.yml). Remplace le postgresql.conf
# stock livre par l'image pgvector/pgvector:pg16 (shared_buffers=128MB par
# defaut, work_mem=4MB, max_connections=100).
#
# Chaque valeur ci-dessous est derivee de deux hypotheses documentees dans
# docs/scale-runway.md, PAS mesurees sur la boite Hetzner reelle (aucun acces
# SSH disponible pour cette tache) :
#   1. RAM totale hypothese = 16 Go (SCA8), dont 4 Go alloues au conteneur
#      `db` via mem_limit (docker-compose.prod.yml).
#   2. Arithmetique connexions SCA7 : plafond theorique pire cas ~43
#      connexions simultanees (Django 12 + Celery ~1-4 + FastAPI jusqu'a 30
#      en pic), largement sous max_connections=100.
#
# RECALIBRER CES VALEURS des que SCA7 vit (mesure RAM/CPU reels de la boite).
# Voir docs/scale-runway.md section "SCA11 — postgresql.conf tune et monte"
# pour le detail de chaque calcul.

# ── Memoire ──────────────────────────────────────────────────────────────

# SCA11: recalibrer apres mesure live.
# ~25% de la limite memoire du conteneur `db` (4g, docker-compose.prod.yml),
# PAS de la RAM machine totale partagee avec les 10 autres conteneurs.
# CRITIQUE — sans cette ligne, PostgreSQL retombe sur son defaut compile
# (listen_addresses='localhost') et n'ecoute QUE dans le conteneur : tous les
# autres services recoivent « Connection refused » sur db:5432. L'image docker
# pose '*' via le postgresql.conf genere par initdb ; un config_file= custom
# REMPLACE ce fichier et doit donc re-declarer l'ecoute reseau.
# (Cause du rollback du deploiement du 2026-07-10.)
listen_addresses = '*'

shared_buffers = 1GB

# SCA11: recalibrer apres mesure live.
# ~75% de la limite memoire du conteneur `db` — indique au planner combien
# de cache OS/Postgres est raisonnablement disponible pour les I/O, sans
# reserver la memoire (contrairement a shared_buffers).
effective_cache_size = 3GB

# SCA11: recalibrer apres mesure live.
# Alloue PAR OPERATION DE TRI/HASH, potentiellement plusieurs fois par
# requete. Le defaut pg16 (4MB) est trop bas pour du reporting multi-tenant
# (agregations/tris sur des volumes croissants). 8MB double la marge sans
# risquer l'OOM : 8MB x ~23 connexions (arithmetique SCA7, usage normal) x
# ~2 operations concurrentes reste largement sous la limite conteneur 4g.
work_mem = 8MB

# SCA11: recalibrer apres mesure live.
# Valeur de bon sens PostgreSQL (~64-512MB typique) pour VACUUM/CREATE INDEX
# sur une base de taille modeste — pas mesuree, a recalibrer si des VACUUM
# lents sont observes.
maintenance_work_mem = 256MB

# ── Connexions ───────────────────────────────────────────────────────────

# SCA11: recalibrer apres mesure live.
# Aligne sur le defaut pg16 ET sur l'arithmetique SCA7 (plafond theorique
# pire cas ~43 + Celery concurrency inconnue, largement sous 100). Aucun
# changement necessaire tant que SCA7 live ne montre pas un besoin reel plus
# eleve. Declencheur pgbouncer (NTPLT58, voir docs/scale-runway.md section
# "Piste de decoupage physique — Etape 1") : (workers x threads + celery)
# approche cette valeur.
max_connections = 100

# ── Observabilite (NTPLT19) ────────────────────────────────────────────────
# pg_stat_statements : agrege le temps d'execution par requete normalisee, base
# de l'endpoint superuser core/db-stats/ (top 20 requetes par temps total). Doit
# etre prechargee au demarrage (impossible via CREATE EXTENSION seul). Cout
# memoire borne (pg_stat_statements.max entrees). L'endpoint degrade proprement
# si cette ligne est absente (ex. base de test CI sans cette conf) : aucune
# migration ne CREATE EXTENSION en dur, donc aucun risque de casser migrate.
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 5000
pg_stat_statements.track = top

# ── Notes ────────────────────────────────────────────────────────────────
# Pas de reglage WAL/checkpoint/autovacuum specifique pose ici — les defauts
# pg16 stock restent en vigueur pour ces familles de parametres tant qu'un
# probleme mesure (checkpoints trop frequents, autovacuum en retard) ne
# justifie pas de les tuner. Ajouter au besoin, jamais par anticipation non
# justifiee.
