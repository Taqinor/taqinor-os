name: erp-agentique

services:
  nginx:
    build: ./backend/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django_core
      - fastapi_ia
    restart: always

  django_core:
    build: ./backend/django_core
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/django_core:/app
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    restart: always

  fastapi_ia:
    build: ./backend/fastapi_ia
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend/fastapi_ia:/app
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
    expose:
      - "8001"
    restart: always

  celery_worker:
    # Utilise le code Django (django_core) car le worker a besoin des modules Django.
    # Le dossier backend/celery_worker/ contient des tâches Celery additionnelles
    # à intégrer dans django_core/erp_agentique/celery.py si nécessaire.
    build: ./backend/django_core
    command: celery -A erp_agentique worker -l info
    volumes:
      - ./backend/django_core:/app
    env_file:
      - ./.env
    depends_on:
      - redis
      - django_core
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_IA_API_URL: ${VITE_IA_API_URL}
    depends_on:
      - django_core
    restart: always

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

volumes:
  pg_data:
  minio_data:
