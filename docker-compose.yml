name: erp-agentique

# SCA8 — ce compose de BASE (dev + superposé par docker-compose.prod.yml en
# prod) reste SANS mem_limit/cpus : les limites de ressources conservatrices
# vivent uniquement dans docker-compose.prod.yml (dev garde le comportement
# actuel, non borné, pour ne pas gêner le développement local). Voir
# docs/scale-runway.md section « SCA8 — Limites de ressources conteneurs »
# pour le détail et la justification par service.
services:
  nginx:
    build: ./backend/nginx
    ports:
      - "80:80"
      - "443:443"
      # Écouteur minimal du webhook leads site web — lié à localhost
      # uniquement : seul le tunnel sortant (cloudflared) y accède.
      - "127.0.0.1:8090:8090"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django_core
      - fastapi_ia
      - frontend
    restart: always

  django_core:
    build: ./backend/django_core
    # SCA16 — GUNICORN_WORKERS/GUNICORN_THREADS surchargeables via .env sans
    # éditer ce compose. Défauts = comportement ACTUEL (4 workers, pas de
    # --threads posé en dev — --worker-class sync reste sync même avec
    # GUNICORN_THREADS>1, cohérent avec avant SCA16). Formule de
    # dimensionnement : docs/scale-runway.md section SCA16.
    command: gunicorn erp_agentique.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout 120 --worker-class sync
    volumes:
      - ./backend/django_core:/app
      # Canonical pipeline stages — single source of truth (CLAUDE.md rule #2).
      # Mounted outside /app so it never creates a placeholder in the source tree.
      - ./STAGES.py:/opt/STAGES.py:ro
    env_file:
      - ./.env
    # SCA10 — cible le cache Django sur l'instance Redis dédiée par défaut
    # (settings/base.py retombe sur REDIS_HOST si REDIS_CACHE_HOST est vide,
    # donc surchageable/annulable via .env sans casser la rétro-compatibilité).
    #
    # NTPLT3 — défense en profondeur RLS. Quand POSTGRES_RLS_ENABLED=1 ET
    # DB_APP_USER/DB_APP_PASSWORD sont définis dans .env, ce service RUNTIME
    # (gunicorn) se connecte avec le rôle applicatif NON-BYPASSRLS `app_rls`
    # (cf. backend/db/rls_roles.sql) : il est physiquement soumis aux policies
    # RLS (`manage.py rls --apply`), le GUC app.current_company (NTPLT1) décide
    # des lignes visibles. migrate/seed/dump restent sur le rôle OWNER
    # (settings détecte la commande manage.py). Défaut OFF : sans le flag,
    # l'owner (${DB_USER}) est utilisé partout — comportement inchangé.
    # Provisionner le rôle UNE fois : psql < backend/db/rls_roles.sql (mot de
    # passe à choisir, jamais committé).
    environment:
      REDIS_CACHE_HOST: ${REDIS_CACHE_HOST:-redis_cache}
      POSTGRES_RLS_ENABLED: ${POSTGRES_RLS_ENABLED:-0}
      DB_APP_USER: ${DB_APP_USER:-}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:-}
    depends_on:
      - db
      - redis
      - redis_cache
    expose:
      - "8000"
    restart: always

  fastapi_ia:
    build: ./backend/fastapi_ia
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    volumes:
      - ./backend/fastapi_ia:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ./.env
    # ERR3 — L'agent NL->SQL doit se connecter avec un role Postgres DEDIE EN
    # LECTURE SEULE (SELECT uniquement, AUCUN INSERT/UPDATE/DELETE/DDL), JAMAIS le
    # role owner (${DB_USER}). Definir ces variables dans .env active le role :
    #   SQL_AGENT_DB_USER / SQL_AGENT_DB_PASSWORD
    # Si elles sont absentes, le service retombe sans rien casser sur DATABASE_URL.
    # Provisionnement du role (a executer UNE fois, manuellement, par le founder —
    # ne pas inventer de secret ici ; choisir un mot de passe robuste) :
    #   CREATE ROLE sql_agent_ro LOGIN PASSWORD '<choisir>';
    #   GRANT CONNECT ON DATABASE erp_db TO sql_agent_ro;
    #   GRANT USAGE ON SCHEMA public TO sql_agent_ro;
    #   GRANT SELECT ON ALL TABLES IN SCHEMA public TO sql_agent_ro;
    #   ALTER DEFAULT PRIVILEGES IN SCHEMA public
    #       GRANT SELECT ON TABLES TO sql_agent_ro;
    #   -- (volontairement AUCUN INSERT/UPDATE/DELETE/TRUNCATE/DDL accorde)
    environment:
      SQL_AGENT_DB_USER: ${SQL_AGENT_DB_USER:-}
      SQL_AGENT_DB_PASSWORD: ${SQL_AGENT_DB_PASSWORD:-}
    depends_on:
      - db
      - redis
    expose:
      - "8001"
    restart: always

  celery_worker:
    # Utilise le code Django (django_core) car le worker a besoin des modules Django.
    # Le dossier backend/celery_worker/ contient des tâches Celery additionnelles
    # à intégrer dans django_core/erp_agentique/celery.py si nécessaire.
    build: ./backend/django_core
    # YOPSB9/SCA9 — ce worker consomme désormais SEULEMENT `default,scheduled`
    # (cf. CELERY_TASK_ROUTES dans settings/base.py) : la queue `interactive`
    # (rendus PDF déclenchés par un clic commercial, transcription vocale) est
    # isolée dans le conteneur DÉDIÉ `celery_worker_interactive` ci-dessous —
    # un backlog `scheduled` (dumps DB, digests, sweeps planifiés) ne peut
    # plus retarder un rendu PDF interactif : deux process Celery distincts,
    # queues disjointes, aucun overlap possible par construction (`-Q`
    # restreint strictement les queues qu'un worker consomme).
    # SCA16 — CELERY_CONCURRENCY (env, .env) surchargeable ; VIDE par défaut =
    # comportement ACTUEL (pas de --concurrency posé = défaut natif Celery,
    # cpu_count() du conteneur). sh -c conditionnel : n'ajoute --concurrency=
    # QUE si la variable est non-vide (jamais un --concurrency= vide invalide).
    # NTPLT27 — ajoute la queue `bulk` (imports/backfills/seed de masse) à ce
    # worker : le travail de masse est consommé sans jamais partager le process
    # de la queue `interactive` (rendus PDF), qui reste isolée dans son propre
    # conteneur. Additif : sans tâche routée sur `bulk`, aucun changement.
    command: >
      sh -c "celery -A erp_agentique worker -l info -Q default,scheduled,bulk
      ${CELERY_CONCURRENCY:+--concurrency=$CELERY_CONCURRENCY}"
    volumes:
      - ./backend/django_core:/app
      - ./STAGES.py:/opt/STAGES.py:ro
    env_file:
      - ./.env
    # SCA10 — même cible cache que django_core (voir commentaire ci-dessus).
    environment:
      REDIS_CACHE_HOST: ${REDIS_CACHE_HOST:-redis_cache}
    depends_on:
      - redis
      - redis_cache
      - django_core
    restart: always

  celery_worker_interactive:
    # SCA9 — worker DÉDIÉ à la queue `interactive` (rendus PDF synchrones
    # ventes.generate_devis_pdf/generate_facture_pdf + chat.transcribe_voice_
    # attachment — cf. CELERY_TASK_ROUTES dans settings/base.py:376-419,
    # INCHANGÉ par cette tâche). Isolé du worker `default,scheduled` :
    # un batch planifié de nuit ne peut plus affamer un rendu PDF attendu en
    # direct par un commercial. Concurrency explicite (pas le défaut
    # cpu_count()) car ce worker n'a besoin que d'absorber quelques rendus
    # PDF simultanés, pas de saturer la boîte.
    build: ./backend/django_core
    command: celery -A erp_agentique worker -l info -Q interactive
             --concurrency=${CELERY_INTERACTIVE_CONCURRENCY:-2}
    volumes:
      - ./backend/django_core:/app
      - ./STAGES.py:/opt/STAGES.py:ro
    env_file:
      - ./.env
    # SCA10 — même cible cache que django_core (voir commentaire ci-dessus).
    environment:
      REDIS_CACHE_HOST: ${REDIS_CACHE_HOST:-redis_cache}
    depends_on:
      - redis
      - redis_cache
      - django_core
    restart: always

  celery_beat:
    # Planificateur Celery Beat : déclenche les tâches périodiques définies dans
    # erp_agentique/celery.py (factures en retard, relances, récapitulatifs N76,
    # rapports planifiés N79). Même image/env que le worker ; un SEUL beat suffit.
    build: ./backend/django_core
    command: celery -A erp_agentique beat -l info
    volumes:
      - ./backend/django_core:/app
      - ./STAGES.py:/opt/STAGES.py:ro
    env_file:
      - ./.env
    depends_on:
      - redis
      - django_core
    restart: always

  frontend:
    build:
      # Contexte = racine du repo : la page ERP /devis-design importe (alias Vite)
      # le builder 3D roofPro11 depuis apps/web/src, qui doit donc être présent
      # dans le contexte de build (un contexte ./frontend seul casse le build).
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_IA_API_URL: ${VITE_IA_API_URL}
        # Public contact form parked by default (0). Set to 1 + rebuild to show it.
        VITE_CONTACT_FORM_ENABLED: ${VITE_CONTACT_FORM_ENABLED:-0}
    expose:
      - "80"
    depends_on:
      - django_core
    restart: always

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # SCA11 — postgresql.conf tune monte en lecture seule + demarre Postgres
    # avec -c config_file= pointant dessus (mecanisme standard de l'image
    # postgres officielle, dont pgvector/pgvector derive : le fichier stock
    # dans /var/lib/postgresql/data n'est PAS ecrase par ce montage, on
    # demande juste au serveur de charger notre conf a la place). Voir
    # backend/db/postgresql.conf et docs/scale-runway.md pour le detail des
    # valeurs.
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    # DEV UNIQUEMENT — supprimer ces ports en production
    ports:
      - "5433:5432"
    restart: always

  # NTPLT58 — pgbouncer OPTIONNEL (transaction pooling). Opt-in derriere le
  # profil docker `scale` : la stack par defaut ne le demarre PAS. Ne s'active
  # qu'avec `docker compose --profile scale up`. Contrat d'activation cote
  # applicatif : PGBOUNCER=1 bascule l'hote DB sur ce service (voir
  # erp_agentique/settings/base.py + docs/scale-runway.md). Les migrations et
  # dumps pointent TOUJOURS la DB directe (db:5432), jamais le pooler.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    profiles: ["scale"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
    depends_on:
      - db
    ports:
      - "6432:6432"
    restart: always

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # DEV UNIQUEMENT — supprimer ces ports en production
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  redis:
    image: redis:7.4-alpine
    # SCA10 — broker Celery UNIQUEMENT (db0, CELERY_BROKER_URL). `noeviction`
    # (explicite désormais, c'était déjà le défaut Redis implicite) : un
    # broker ne doit JAMAIS évincer des tâches en attente sous pression
    # mémoire — il doit plutôt refuser l'écriture (comportement noeviction)
    # pour que l'appelant sache que l'enqueue a échoué. `maxmemory 256mb`
    # dimensionné sous la limite conteneur SCA8 (1g en prod) — une file de
    # tâches ne devrait jamais approcher cette taille en usage normal.
    # `appendonly yes` (persistance AOF) : un restart Redis ne perd plus les
    # tâches en file d'attente (avant SCA10, un restart perdait tout — db0
    # et db1 étaient en mémoire pure, sans persistance).
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes
    # DEV UNIQUEMENT — supprimer ce port en production
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  redis_cache:
    # SCA10 — cache applicatif Django (CACHES['default'], db1 auparavant sur
    # la MÊME instance que le broker). Instance SÉPARÉE : `allkeys-lru`
    # (éviction des clés les moins récemment utilisées sous pression — le
    # comportement CORRECT pour un cache, jamais pour un broker) + AUCUNE
    # persistance (`--save ""` : un cache est par nature jetable, pas besoin
    # de survivre à un restart, et évite l'overhead disque inutile).
    image: redis:7.4-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    restart: always

volumes:
  pg_data:
  minio_data:
  hf_cache:
  redis_data:
