name: CI

on:
  # Run push-triggered CI ONLY on the integration branches. Feature/PR
  # branches are fully covered by the pull_request trigger below, which diffs
  # against the PR base (main) so the change-detector skips heavy jobs
  # correctly. Without this filter every feature-branch push (branch creation,
  # main-integration merges, each commit) re-ran the whole suite a second time
  # with a stale baseline — pure waste. The PR run remains the merge gate.
  push:
    branches: [main, dev]
  pull_request:

# Cancel a superseded run on the same PR when a newer commit is pushed, so
# rapid pushes don't pile up redundant runs. Never cancels push runs on
# main/dev (those gate the deploy and must finish).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# NOTE on path filtering (see docs/CODEMAP.md §7):
# We do NOT use top-level `on: paths`/`paths-ignore`. A workflow skipped by a
# top-level path filter leaves its checks stuck in "Pending", which would
# *block* a PR that requires them (GitHub Docs: "Troubleshooting required
# status checks"). Instead, every heavy/lint job is gated by a per-job `if:`
# on the `changes` detector below. A job skipped by an `if:` conditional
# reports "Success" to branch protection, so it never deadlocks a merge.
# `stage-names` is intentionally left ungated (it is fast and is the broad
# drift guard), and `ci-gate` is an always-running aggregate so a single
# required check can be pinned safely.

jobs:
  # ---------------------------------------------------------------------------
  # Change detector. Resolves which surfaces a push/PR touched, using pure git
  # (no third-party action). It FAILS OPEN: whenever a precise diff range can't
  # be resolved (new branch, force-push, shallow history, missing base) it runs
  # the full suite, so a real code change can never silently skip its tests.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      web: ${{ steps.detect.outputs.web }}
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          backend=false; frontend=false; web=false
          run_all=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          elif [ "$EVENT_NAME" = "push" ]; then
            base="$PUSH_BEFORE"; head="$PUSH_AFTER"
          else
            base=""; head=""
          fi

          # Fail open on anything we cannot resolve to a precise diff range.
          if [ -z "$base" ] || [ -z "$head" ]; then run_all=true; fi
          case "$base" in *[!0]*) : ;; *) run_all=true ;; esac   # all-zeros => new branch
          if [ "$run_all" = false ]; then
            git cat-file -e "${base}^{commit}" 2>/dev/null || run_all=true
          fi
          if [ "$run_all" = false ]; then
            git cat-file -e "${head}^{commit}" 2>/dev/null || run_all=true
          fi

          if [ "$run_all" = true ]; then
            echo "Could not resolve a precise diff range — running the FULL suite (fail-open)."
            backend=true; frontend=true; web=true
          else
            changed="$(git diff --name-only "$base" "$head")"
            echo "Changed files between ${base} and ${head}:"
            echo "$changed"
            # Touching CI/infra re-runs the whole suite (it can change how any
            # job builds or tests). The `|| true` keeps a no-match (grep exit 1)
            # from tripping `set -e`.
            echo "$changed" | grep -qE '^\.github/'                   && { backend=true; frontend=true; web=true; } || true
            echo "$changed" | grep -qE '^docker-compose[^/]*\.ya?ml$' && { backend=true; frontend=true; web=true; } || true
            # Shared backend<->frontend contract: exercise both sides + e2e.
            echo "$changed" | grep -qE '^STAGES\.py$'                 && { backend=true; frontend=true; } || true
            echo "$changed" | grep -qE '^backend/'                    && backend=true  || true
            echo "$changed" | grep -qE '^frontend/'                   && frontend=true || true
            echo "$changed" | grep -qE '^apps/web/'                   && web=true      || true
            # Everything else (docs/**, *.md, top-level state files, etc.)
            # affects none of the heavy jobs — only the always-on stage-names
            # guard, which is not gated here.
          fi

          # The e2e browser suite is the cross-surface net: any application
          # code (backend OR frontend, incl. the STAGES.py contract) runs it;
          # website-only and docs-only changes do not.
          code=false
          if [ "$backend" = true ] || [ "$frontend" = true ]; then code=true; fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "web=$web"
            echo "code=$code"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved -> backend=$backend frontend=$frontend web=$web e2e(code)=$code"

  backend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - name: Lint backend (flake8)
        run: flake8 backend --max-line-length=120 --extend-ignore=E501 --exclude=migrations

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: localhost:9000
      MINIO_ROOT_USER: erp_admin
      MINIO_ROOT_PASSWORD: erp_minio_password
      MINIO_BUCKET_PDF: erp-pdf
      MINIO_BUCKET_UPLOADS: erp-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b fonts-dejavu-core
      - name: Install Python dependencies
        working-directory: backend/django_core
        run: pip install -r requirements.txt
      - name: Start MinIO + create buckets
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=erp_admin \
            -e MINIO_ROOT_PASSWORD=erp_minio_password \
            minio/minio:latest server /data
          # Attente de disponibilité (endpoint santé MinIO).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO prêt"; break
            fi
            echo "Attente MinIO ($i)…"; sleep 2
            if [ "$i" = "30" ]; then echo "MinIO indisponible"; exit 1; fi
          done
          # Pré-création des buckets (erp-pdf est aussi auto-créé par l'app).
          # L'entrypoint de minio/mc est « mc » → on force « sh » pour chaîner.
          docker run --rm --network host --entrypoint sh minio/mc:latest -c "
            mc alias set local http://localhost:9000 erp_admin erp_minio_password &&
            mc mb -p local/erp-pdf local/erp-uploads"
      - name: Run Django test suite
        working-directory: backend/django_core
        run: python manage.py test apps authentication -v 2

  frontend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend (eslint)
        working-directory: frontend
        run: npm run lint
      - name: Frontend unit tests (solar math parity + catalogue)
        working-directory: frontend
        run: node --test "src/features/ventes/solar.test.mjs" "src/features/ventes/previewPdf.test.mjs" "src/features/stock/catalogue.test.mjs" "src/api/origin.test.mjs" "src/features/crm/stages.test.mjs" "src/features/crm/bulk.test.mjs" "src/features/installations/statuses.test.mjs" "src/pages/reporting/archiveDocs.test.mjs" "src/features/stock/procurement.test.mjs" "src/features/stock/emplacements.test.mjs" "src/components/layout/menu.layout.test.mjs" "src/lib/format.test.mjs" "src/design/theme.test.mjs" "src/ui/datatable/datatable.test.mjs" "src/ui/date-utils.test.mjs" "src/ui/file-utils.test.mjs" "src/ui/form-utils.test.mjs"

  stage-names:
    # Intentionally UNGATED: this is the fast, broad drift guard. It must run on
    # docs/plan changes (plan fingerprint), on STAGES.py, and on any structural
    # change that feeds the CODEMAP fingerprint or the stage-name scan — so it
    # always runs, on every push and PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check pipeline stage names against STAGES.py
        run: python scripts/check_stages.py
      - name: Check CODEMAP structural fingerprint
        run: python scripts/codemap_fingerprint.py --check

  web-build-test:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install apps/web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Type-check apps/web logic (tsc — src/lib estimator/math surface)
        working-directory: apps/web
        run: npm run check
      - name: Build marketing site (astro build)
        working-directory: apps/web
        run: npm run build
      - name: Run apps/web test suite (vitest)
        working-directory: apps/web
        run: npm test

  # End-to-end browser suite (Playwright). Reuses the SAME throwaway services as
  # backend-tests (Postgres+pgvector, Redis, MinIO — never production), serves
  # the real built app via vite preview (same-origin proxy to Django), and drives
  # 16 flows headless. Seeds only throwaway demo data (manage.py seed_demo).
  # Gated on `code` (backend OR frontend, incl. the STAGES.py contract): it is
  # the cross-surface integration net and must NOT skip on a backend- or
  # frontend-only change; it skips only on website-only and docs-only changes.
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: localhost:9000
      MINIO_ROOT_USER: erp_admin
      MINIO_ROOT_PASSWORD: erp_minio_password
      MINIO_BUCKET_PDF: erp-pdf
      MINIO_BUCKET_UPLOADS: erp-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b fonts-dejavu-core
      - name: Install Python dependencies
        working-directory: backend/django_core
        run: pip install -r requirements.txt
      - name: Start MinIO + create buckets
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=erp_admin \
            -e MINIO_ROOT_PASSWORD=erp_minio_password \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO prêt"; break
            fi
            echo "Attente MinIO ($i)…"; sleep 2
            if [ "$i" = "30" ]; then echo "MinIO indisponible"; exit 1; fi
          done
          docker run --rm --network host --entrypoint sh minio/mc:latest -c "
            mc alias set local http://localhost:9000 erp_admin erp_minio_password &&
            mc mb -p local/erp-pdf local/erp-uploads"
      - name: Migrate + seed throwaway demo data
        working-directory: backend/django_core
        run: |
          python manage.py migrate --noinput
          python manage.py seed_demo
          # The simulator catalogue (defaults to the seeded `taqinor-demo`
          # company) is what the auto-devis sizing matches against.
          python manage.py seed_catalogue
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend (no service worker for E2E)
        working-directory: frontend
        env:
          VITE_E2E: '1'
        run: npm run build
      - name: Start Django + run E2E specs
        working-directory: backend/django_core
        run: |
          gunicorn erp_agentique.wsgi:application \
            --bind 127.0.0.1:8000 --workers 3 --timeout 120 --worker-class sync &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://127.0.0.1:8000/api/django/admin/login/ || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "Django prêt (HTTP $code)"; break
            fi
            echo "Attente Django ($i)…"; sleep 2
            if [ "$i" = "30" ]; then echo "Django indisponible"; exit 1; fi
          done
          cd ../../frontend
          npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Always-running aggregate gate. Pin THIS one job as the single required
  # status check on `main`: because it always runs (if: always()) it can never
  # be left "Pending", and it passes only when no job that actually ran failed
  # or was cancelled. A SKIPPED job (path-filtered out) counts as acceptable —
  # `contains(needs.*.result, 'failure')` is false for 'skipped'/'success'.
  # ---------------------------------------------------------------------------
  ci-gate:
    if: ${{ always() }}
    needs:
      - changes
      - backend-lint
      - backend-tests
      - frontend-lint
      - stage-names
      - web-build-test
      - e2e
    runs-on: ubuntu-latest
    steps:
      - name: Report job results
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "backend-lint=${{ needs.backend-lint.result }}"
          echo "backend-tests=${{ needs.backend-tests.result }}"
          echo "frontend-lint=${{ needs.frontend-lint.result }}"
          echo "stage-names=${{ needs.stage-names.result }}"
          echo "web-build-test=${{ needs.web-build-test.result }}"
          echo "e2e=${{ needs.e2e.result }}"
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled — see results above."
          exit 1
      - name: All clear
        run: echo "All CI jobs that ran passed (skipped jobs are acceptable)."
