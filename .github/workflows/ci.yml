name: CI

on:
  # Run push-triggered CI ONLY on the integration branches. Feature/PR
  # branches are fully covered by the pull_request trigger below, which diffs
  # against the PR base (main) so the change-detector skips heavy jobs
  # correctly. Without this filter every feature-branch push (branch creation,
  # main-integration merges, each commit) re-ran the whole suite a second time
  # with a stale baseline — pure waste. The PR run remains the merge gate.
  push:
    branches: [main, dev]
  pull_request:

# Cancel a superseded run on the same PR when a newer commit is pushed, so
# rapid pushes don't pile up redundant runs. Never cancels push runs on
# main/dev (those gate the deploy and must finish).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# NOTE on path filtering (see docs/CODEMAP.md §7):
# We do NOT use top-level `on: paths`/`paths-ignore`. A workflow skipped by a
# top-level path filter leaves its checks stuck in "Pending", which would
# *block* a PR that requires them (GitHub Docs: "Troubleshooting required
# status checks"). Instead, every heavy/lint job is gated by a per-job `if:`
# on the `changes` detector below. A job skipped by an `if:` conditional
# reports "Success" to branch protection, so it never deadlocks a merge.
# `stage-names` is intentionally left ungated (it is fast and is the broad
# drift guard), and `ci-gate` is an always-running aggregate so a single
# required check can be pinned safely.

jobs:
  # ---------------------------------------------------------------------------
  # Change detector. Resolves which surfaces a push/PR touched, using pure git
  # (no third-party action). It FAILS OPEN: whenever a precise diff range can't
  # be resolved (new branch, force-push, shallow history, missing base) it runs
  # the full suite, so a real code change can never silently skip its tests.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      web: ${{ steps.detect.outputs.web }}
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          backend=false; frontend=false; web=false
          run_all=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          elif [ "$EVENT_NAME" = "push" ]; then
            base="$PUSH_BEFORE"; head="$PUSH_AFTER"
          else
            base=""; head=""
          fi

          # Fail open on anything we cannot resolve to a precise diff range.
          if [ -z "$base" ] || [ -z "$head" ]; then run_all=true; fi
          case "$base" in *[!0]*) : ;; *) run_all=true ;; esac   # all-zeros => new branch
          if [ "$run_all" = false ]; then
            git cat-file -e "${base}^{commit}" 2>/dev/null || run_all=true
          fi
          if [ "$run_all" = false ]; then
            git cat-file -e "${head}^{commit}" 2>/dev/null || run_all=true
          fi

          if [ "$run_all" = true ]; then
            echo "Could not resolve a precise diff range — running the FULL suite (fail-open)."
            backend=true; frontend=true; web=true
          else
            changed="$(git diff --name-only "$base" "$head")"
            echo "Changed files between ${base} and ${head}:"
            echo "$changed"
            # CI / infra / docs / config changes (.github/**, docker-compose*,
            # docs, *.md, .gitignore, .claude/**, top-level state) do NOT run
            # the heavy jobs: they cannot change application behaviour, so the
            # only signal that matters is the always-on `stage-names` drift
            # guard (check_stages + CODEMAP fingerprint), which is ungated
            # below. A ci.yml edit that changes a test command is therefore not
            # re-validated on its own PR — by design (minimal CI); the fail-open
            # above still runs the FULL suite when the diff range itself is
            # unresolvable (new branch / force-push / shallow clone). The
            # `|| true` keeps a no-match (grep exit 1) from tripping `set -e`.
            # Use here-strings (NOT `echo | grep -q`): with a large `$changed`,
            # `grep -q` exits on first match before `echo` finishes writing, so
            # `echo` takes SIGPIPE and (under `set -o pipefail`) the pipeline
            # returns 141 — which made `&& backend=true` silently NOT run, so a
            # huge backend diff was mis-detected as backend=false and skipped the
            # required backend-tests gate. A here-string has no pipe writer to
            # kill, so grep's real exit status drives the `&&`.
            # Shared backend<->frontend contract: exercise both sides + e2e.
            grep -qE '^STAGES\.py$'  <<< "$changed" && { backend=true; frontend=true; } || true
            grep -qE '^backend/'     <<< "$changed" && backend=true  || true
            grep -qE '^frontend/'    <<< "$changed" && frontend=true || true
            grep -qE '^apps/web/'    <<< "$changed" && web=true      || true
            # Everything else (docs/**, *.md, top-level state files, etc.)
            # affects none of the heavy jobs — only the always-on stage-names
            # guard, which is not gated here.
          fi

          # The e2e browser suite is the cross-surface net: any application
          # code (backend OR frontend, incl. the STAGES.py contract) runs it;
          # website-only and docs-only changes do not.
          code=false
          if [ "$backend" = true ] || [ "$frontend" = true ]; then code=true; fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "web=$web"
            echo "code=$code"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved -> backend=$backend frontend=$frontend web=$web e2e(code)=$code"

  backend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # MUST match prod (django_core/fastapi Dockerfiles: python:3.11.x). A 3.12+/3.13 CI would not catch 3.11-only SyntaxErrors (e.g. backslash in f-string) that crash the live PDF generator.
      - name: Byte-compile on prod Python (catches 3.11-only SyntaxErrors, incl. in flake8-noqa files)
        run: python -m compileall -q backend/django_core/apps backend/django_core/erp_agentique backend/fastapi_ia
      - run: pip install flake8 import-linter==2.11
      - name: Lint backend (flake8)
        run: flake8 backend --max-line-length=120 --extend-ignore=E501 --exclude=migrations
      - name: Lint imports (import-linter contracts — M3)
        working-directory: backend/django_core
        run: lint-imports
      # ARC52 — garde-fous du socle en UN script DB-free (ARC8 *Activity, ARC26
      # FileField, ARC11 imports WeasyPrint hors allowlist, ARC6 numérotation
      # count()+1 hors socle). Étape ajoutée au job backend-lint EXISTANT — pas
      # un nouveau check requis (protection de branche inchangée).
      - name: Platform-kernel guards (check_platform — ARC8/26/11/6)
        run: python scripts/check_platform.py
      # YDATA1/3 — every FK/O2O declares on_delete=, every CASCADE is either
      # inline-justified ('# on_delete: <reason>') or reviewed+allowlisted;
      # every SET_NULL has null=True and never targets a tenant/owner field.
      - name: Check on_delete completeness/justification (YDATA1/3)
        run: python scripts/check_on_delete.py
      # YDATA2 — financial-target FK (Devis/Facture/BonCommande/Paiement/
      # Avoir/Company/Produit) sweep: fails only on a NEW un-reviewed
      # CASCADE/SET_NULL (docs/on-delete-financial-audit.md is the baseline).
      - name: Check financial-target on_delete sweep (YDATA2)
        run: python scripts/check_on_delete.py --financial
      # YDATA4 — every business-app model carries a company scope (direct
      # FK, TenantModel base, or transitively via a FK to a scoped model).
      - name: Check multi-tenant company-FK completeness (YDATA4)
        run: python scripts/check_company_fk.py
      # YDATA6/7 — money-semantic fields are DecimalField (never FloatField,
      # GPS/rate names excepted) with explicit max_digits/decimal_places=2
      # (4 tolerated for taux_*/*_pct/pourcentage rate fields).
      - name: Check money fields are DecimalField (YDATA6)
        run: python scripts/check_money_fields.py
      - name: Check money DecimalField max_digits/decimal_places (YDATA7)
        run: python scripts/check_money_fields.py --decimal-places

  # WOW6 — the fast backend suite is sharded 4× across free public-repo runners
  # (matrix legs run concurrently, each on its own 4-vCPU runner + Postgres). The
  # REQUIRED `backend-tests` status check name is preserved by the thin
  # `backend-tests` aggregator job defined right after this one.
  backend-tests-shard:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: localhost:9000
      MINIO_ROOT_USER: erp_admin
      MINIO_ROOT_PASSWORD: erp_minio_password
      MINIO_BUCKET_PDF: erp-pdf
      MINIO_BUCKET_UPLOADS: erp-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # MUST match prod (django_core/fastapi Dockerfiles: python:3.11.x). A 3.12+/3.13 CI would not catch 3.11-only SyntaxErrors (e.g. backslash in f-string) that crash the live PDF generator.
          cache: 'pip'   # WOW4 — cache les deps Python (npm l'était déjà, pas pip) ; clé sur requirements-dev.txt.
          cache-dependency-path: backend/django_core/requirements-dev.txt
      # WOW7 — shared WeasyPrint + pip (requirements-dev.txt) + MinIO setup.
      # WOW8 — restore the cached pre-migrated test DB (measured: the ~850-
      # migration replay was 2255s of a 2388s shard — 97% of the job); the test
      # step's --keepdb then reuses it and only clones the 4 parallel workers.
      - uses: ./.github/actions/backend-env
        with:
          testdb-cache-into: test_erp_db
      # YOPSB5 — anti-dérive modèle<->migration : échoue si un changement de
      # modèle n'a pas sa migration (index nommé à la main divergent,
      # contrainte sans migration…). Tourne AVANT la suite de tests, même
      # service Postgres/env que celle-ci.
      - name: Check for missing migrations (makemigrations --check)
        working-directory: backend/django_core
        run: python manage.py makemigrations --check --dry-run
      # Palier « par-merge » : tout SAUF les tests lourds étiquetés `pdf`/`slow`
      # (rendu WeasyPrint, golden PDF…). Ceux-ci tournent dans release-verify
      # (manuel + nightly), pour un retour rapide sur chaque merge.
      # WOW6 — ce shard n'exécute QUE son quart des apps (round-robin déterministe
      # via scripts/ci_shard.py) ; l'union des 4 shards == `apps authentication
      # core` (garanti par un test d'égalité d'ensembles). --parallel 4 (WOW1)
      # exploite les 4 vCPU du runner ; `coverage` reste hors du gate (WOW3).
      - name: Run Django test suite — shard ${{ matrix.shard }}/4 (fast tier — excludes pdf/slow)
        working-directory: backend/django_core
        run: |
          LABELS=$(python ../../scripts/ci_shard.py ${{ matrix.shard }} 4)
          echo "Shard ${{ matrix.shard }}/4 -> $LABELS"
          python manage.py test $LABELS -v 2 --exclude-tag=pdf --exclude-tag=slow --parallel 4 --keepdb

  # WOW6 — thin aggregator that PRESERVES the required `backend-tests` status
  # check name. Branch protection requires the literal `backend-tests` context
  # (NOT `ci-gate`), so the real job renamed to `backend-tests-shard` above must
  # be paired with a job still literally named `backend-tests`. Passes iff no
  # shard failed; also passes when the shards SKIP (backend=false), preserving the
  # path-filter "a skipped required check counts as success" behaviour.
  backend-tests:
    needs: [changes, backend-tests-shard]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any shard failed or was cancelled
        if: ${{ needs.backend-tests-shard.result == 'failure' || needs.backend-tests-shard.result == 'cancelled' }}
        run: |
          echo "A backend-tests shard did not pass (result=${{ needs.backend-tests-shard.result }})."
          exit 1
      - name: All shards passed (or were skipped)
        run: echo "backend-tests-shard result=${{ needs.backend-tests-shard.result }} — gate OK."

  frontend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend (eslint)
        working-directory: frontend
        run: npm run lint
      # VX121 — garde « zéro couleur hors token » : les blocs de composants déjà
      # tokenisés d'index.css (form-control/modal/table/lead-nav/page-loading…)
      # ne doivent plus jamais réintroduire un hex codé en dur (script maison,
      # zéro dépendance — frontend/scripts/check_hex.mjs).
      - name: Check hex colors outside design tokens (index.css)
        working-directory: frontend
        run: npm run check-hex
      # Logique pure (sizing solaire, parité catalogue, utils…) : node:test, AUTO-
      # DÉCOUVERTE via glob — tout nouveau *.test.mjs tourne sans liste à tenir.
      - name: Frontend unit tests (node:test — pure logic, auto-discovered)
        working-directory: frontend
        # --experimental-test-coverage : % visible de la logique pure couverte
        # (informatif — n'échoue que sur un test rouge, pas sur un seuil).
        run: node --test --experimental-test-coverage "src/**/*.test.mjs"
      # Couche UX : rendu/interaction (Testing Library) + accessibilité (axe),
      # exécutée par Vitest (fichiers *.test.jsx, jsdom) + résumé de couverture.
      - name: Frontend component + a11y tests (Vitest + Testing Library + axe)
        working-directory: frontend
        run: npm run test:coverage

  # YHARD7 — budget de performance du bundle SPA ERP. Complète le
  # `chunkSizeWarningLimit` (avertissement de build seulement) par un contrôle
  # qui ÉCHOUE la CI si un chunk (ou le total gzippé) dépasse son budget.
  # Dev-only (frontend/scripts/check_bundle_budget.mjs, Node stdlib pur —
  # aucune dépendance ajoutée). Lighthouse-CI reste hors périmètre ici
  # (optionnel/non bloquant) pour éviter la flakiness.
  frontend-perf:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Check bundle budget
        working-directory: frontend
        run: npm run check-bundle-budget

  stage-names:
    # Intentionally UNGATED: this is the fast, broad drift guard. It must run on
    # docs/plan changes (plan fingerprint), on STAGES.py, and on any structural
    # change that feeds the CODEMAP fingerprint or the stage-name scan — so it
    # always runs, on every push and PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # MUST match prod (django_core/fastapi Dockerfiles: python:3.11.x). A 3.12+/3.13 CI would not catch 3.11-only SyntaxErrors (e.g. backslash in f-string) that crash the live PDF generator.
      - name: Check pipeline stage names against STAGES.py
        run: python scripts/check_stages.py
      - name: Check module registry <-> frontend consistency (ODX21)
        run: python scripts/check_modules.py
      - name: Check test determinism (no sleeps / unfrozen live-clock assertions)
        run: python scripts/check_test_determinism.py
      - name: Check heavy tests carry a @tag (WOW5 — keep the fast tier fast)
        run: python scripts/check_test_tags.py
      - name: Check invariant registry (docs/invariants.md still points at real tests)
        run: python scripts/check_invariants.py
      - name: Check CODEMAP structural fingerprint
        run: python scripts/codemap_fingerprint.py --check
      - name: Check for unsafe migration DDL patterns (YOPSB4)
        run: python scripts/check_safe_migrations.py
      - name: Test the safe-migrations checker itself (YOPSB4)
        run: python -m unittest scripts.tests.test_check_safe_migrations -v
      - name: Validate docs/BUILD_ORDER.yml (SCA5 — acyclic DAG, parseable thresholds, no orphaned plan prefix)
        run: python scripts/check_build_order.py
      - name: Test the BUILD_ORDER.yml checker itself (SCA5)
        run: python -m unittest scripts.tests.test_check_build_order -v

  web-build-test:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install apps/web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Type-check apps/web logic (tsc — src/lib estimator/math surface)
        working-directory: apps/web
        run: npm run check
      - name: Build marketing site (astro build)
        working-directory: apps/web
        run: npm run build
      - name: Run apps/web test suite (vitest)
        working-directory: apps/web
        run: npm test

  # End-to-end browser suite (Playwright). Reuses the SAME throwaway services as
  # backend-tests (Postgres+pgvector, Redis, MinIO — never production), serves
  # the real built app via vite preview (same-origin proxy to Django), and drives
  # 16 flows headless. Seeds only throwaway demo data (manage.py seed_demo).
  # Gated on `code` (backend OR frontend, incl. the STAGES.py contract): it is
  # the cross-surface integration net and must NOT skip on a backend- or
  # frontend-only change; it skips only on website-only and docs-only changes.
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: localhost:9000
      MINIO_ROOT_USER: erp_admin
      MINIO_ROOT_PASSWORD: erp_minio_password
      MINIO_BUCKET_PDF: erp-pdf
      MINIO_BUCKET_UPLOADS: erp-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # MUST match prod (django_core/fastapi Dockerfiles: python:3.11.x). A 3.12+/3.13 CI would not catch 3.11-only SyntaxErrors (e.g. backslash in f-string) that crash the live PDF generator.
          cache: 'pip'   # WOW4 — cache les deps Python (npm l'était déjà, pas pip) ; clé sur requirements-dev.txt.
          cache-dependency-path: backend/django_core/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # WOW7 — shared WeasyPrint + pip (requirements-dev.txt) + MinIO setup.
      # WOW8 — restore the cached pre-migrated dump straight into erp_db
      # (measured: this job's migrate+seed step was 1796s of a 1915s total —
      # 94% — while the E2E specs themselves ran in 36s). The migrate below
      # becomes a fast no-op; the seeds still run fresh.
      - uses: ./.github/actions/backend-env
        with:
          testdb-cache-into: erp_db
      - name: Migrate + seed throwaway demo data
        working-directory: backend/django_core
        run: |
          python manage.py migrate --noinput
          python manage.py seed_demo
          # The simulator catalogue (defaults to the seeded `taqinor-demo`
          # company) is what the auto-devis sizing matches against.
          python manage.py seed_catalogue
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers (chromium + webkit)
        working-directory: frontend
        # VX68 — WebKit (Safari réel) en plus de Chromium : le smoke ajoute un
        # passage `mobile-safari` pour attraper ce qui ne casse QUE sur Safari.
        run: npx playwright install --with-deps chromium webkit
      - name: Build frontend (no service worker for E2E)
        working-directory: frontend
        env:
          VITE_E2E: '1'
        run: npm run build
      - name: Start Django + run E2E specs
        working-directory: backend/django_core
        run: |
          gunicorn erp_agentique.wsgi:application \
            --bind 127.0.0.1:8000 --workers 3 --timeout 120 --worker-class sync &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://127.0.0.1:8000/api/django/admin/login/ || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "Django prêt (HTTP $code)"; break
            fi
            echo "Attente Django ($i)…"; sleep 2
            if [ "$i" = "30" ]; then echo "Django indisponible"; exit 1; fi
          done
          cd ../../frontend
          # Palier « smoke » par-merge : parcours UTILISATEUR critiques + santé.
          # `devis.spec` = lead → devis → PDF (le projet `setup` se connecte aussi
          # via la dépendance Playwright). On garde des specs SELF-CONTAINED ici :
          # `leads.spec` (E7 → Signé) dépend d'un devis créé par un spec antérieur
          # dans la matrice ordonnée → reste en e2e COMPLET (release-verify), pas
          # en smoke. La matrice complète + mobile tourne dans release-verify.yml.
          npx playwright test --project=chromium devis.spec.js health.spec.js
          # VX68 — passage WebKit RÉEL (Safari) sur le spec mobile : capte les
          # régressions qui n'apparaissent que sur Safari (VX48 window.open
          # post-await, sticky, backdrop-blur). PR-only, hors matrice complète.
          npx playwright test --project=mobile-safari
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # NTPLT5 — suite d'étanchéité RLS, job FACULTATIF (non-required). N'entre
  # PAS dans ci-gate → la protection de branche reste intacte. Lance la seule
  # suite core.tests.test_rls avec POSTGRES_RLS_ENABLED=1 (elle est sautée
  # partout ailleurs, donc n'alourdit jamais le gate backend-tests requis).
  # ---------------------------------------------------------------------------
  rls-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: localhost:9000
      MINIO_ROOT_USER: erp_admin
      MINIO_ROOT_PASSWORD: erp_minio_password
      MINIO_BUCKET_PDF: erp-pdf
      MINIO_BUCKET_UPLOADS: erp-uploads
      # Active la suite RLS (sautée partout ailleurs).
      POSTGRES_RLS_ENABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/django_core/requirements-dev.txt
      - uses: ./.github/actions/backend-env
      - name: Run RLS seal suite (opt-in — flag ON)
        working-directory: backend/django_core
        run: python manage.py test core.tests.test_rls -v 2

  # ---------------------------------------------------------------------------
  # Always-running aggregate gate. Pin THIS one job as the single required
  # status check on `main`: because it always runs (if: always()) it can never
  # be left "Pending", and it passes only when no job that actually ran failed
  # or was cancelled. A SKIPPED job (path-filtered out) counts as acceptable —
  # `contains(needs.*.result, 'failure')` is false for 'skipped'/'success'.
  # ---------------------------------------------------------------------------
  ci-gate:
    if: ${{ always() }}
    needs:
      - changes
      - backend-lint
      - backend-tests-shard
      - backend-tests
      - frontend-lint
      - frontend-perf
      - stage-names
      - web-build-test
      - e2e
    runs-on: ubuntu-latest
    steps:
      - name: Report job results
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "backend-lint=${{ needs.backend-lint.result }}"
          echo "backend-tests-shard=${{ needs.backend-tests-shard.result }}"
          echo "backend-tests=${{ needs.backend-tests.result }}"
          echo "frontend-lint=${{ needs.frontend-lint.result }}"
          echo "frontend-perf=${{ needs.frontend-perf.result }}"
          echo "stage-names=${{ needs.stage-names.result }}"
          echo "web-build-test=${{ needs.web-build-test.result }}"
          echo "e2e=${{ needs.e2e.result }}"
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled — see results above."
          exit 1
      - name: All clear
        run: echo "All CI jobs that ran passed (skipped jobs are acceptable)."
