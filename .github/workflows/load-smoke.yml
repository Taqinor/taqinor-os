name: load smoke (Locust, opt-in)

# NTPLT49 — job de charge NIGHTLY OPT-IN (workflow_dispatch + cron hebdo),
# NON-REQUIRED (protection de branche intacte). Monte les services CI, applique
# les migrations, seed_scale RÉDUIT (NTPLT47), lance Locust headless ~10 min
# (load/locustfile.py, NTPLT48), publie le rapport HTML en artifact et ÉCHOUE
# si le p95 agrégé dépasse 2× le seuil LISTE documenté (500 ms → 1000 ms, cf.
# docs/load-testing.md) — la régression de perf se voit AVANT le client.

on:
  workflow_dispatch:
    inputs:
      run_time:
        description: 'Durée Locust (ex. 10m, 2m)'
        default: '10m'
  schedule:
    - cron: '0 5 * * 1'   # lundi 05:00 UTC, hebdomadaire

permissions:
  contents: read

jobs:
  load-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: erp_agentique.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      DJANGO_DEBUG: 'True'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      LOCUST_USER: charge@taqinor.local
      LOCUST_PASSWORD: charge-password-not-secret
      P95_LIMIT_MS: '1000'   # 2× le seuil LISTE documenté (500 ms)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend + dev deps (Faker, Locust)
        working-directory: backend/django_core
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Migrate + charge user + seed_scale (réduit)
        working-directory: backend/django_core
        run: |
          python manage.py migrate --noinput
          python manage.py shell <<'PY'
          from django.contrib.auth import get_user_model
          from authentication.models import Company
          User = get_user_model()
          c, _ = Company.objects.get_or_create(nom='[CHARGE] Load smoke')
          u, created = User.objects.get_or_create(
              username='charge', defaults={'email': 'charge@taqinor.local',
                                           'company': c})
          u.email = 'charge@taqinor.local'
          u.company = c
          u.is_active = True
          u.set_password('charge-password-not-secret')
          u.save()
          PY
          python manage.py seed_scale --companies 2 --users 20 \
            --leads 5000 --devis 500 --lignes 5000 --mouvements 5000 \
            --force-je-sais

      - name: Run Django server (background)
        working-directory: backend/django_core
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 > server.log 2>&1 &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://localhost:8000/api/django/token/ || echo 000)
            case "$code" in 2*|4*) echo "Django prêt ($code)"; break;; esac
            echo "Attente Django ($i)…"; sleep 1
          done

      - name: Locust headless (~10 min)
        working-directory: backend/django_core
        run: |
          locust -f ../../load/locustfile.py \
            --host http://localhost:8000 \
            --headless -u 20 -r 2 \
            --run-time "${{ github.event.inputs.run_time || '10m' }}" \
            --html ../../locust-report.html \
            --csv ../../locust || true

      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: |
            locust-report.html
            locust_stats.csv

      - name: Gate on p95 (échoue si > 2× le seuil documenté)
        run: |
          python - <<'PY'
          import csv, os, sys
          limit = float(os.environ.get('P95_LIMIT_MS', '1000'))
          path = 'locust_stats.csv'
          if not os.path.exists(path):
              print('Pas de CSV Locust — smoke non concluant (non bloquant).')
              sys.exit(0)
          agg = None
          with open(path) as f:
              for row in csv.DictReader(f):
                  if row.get('Name') == 'Aggregated':
                      agg = row
          if not agg:
              print('Ligne Aggregated absente — non bloquant.')
              sys.exit(0)
          col = next((k for k in agg if '95%' in k), None)
          p95 = float(agg.get(col) or 0)
          print(f'p95 agrégé = {p95} ms (limite {limit} ms)')
          if p95 > limit:
              print('::error::Régression de perf : p95 au-delà de 2× le seuil.')
              sys.exit(1)
          PY
