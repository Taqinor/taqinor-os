<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- VX200 — Defense en profondeur : repli de base si le SPA est jamais
         servi hors du proxy nginx principal (qui pose deja la vraie CSP par
         environnement, voir backend/nginx/nginx.conf). Volontairement PERMISSIF
         sur les origines (http:/https:) pour ne jamais retrecir la CSP reelle
         par intersection (deux CSP simultanees = la plus stricte des deux sur
         chaque directive) ; ne bloque que l'essentiel (scripts hors origine).
         `frame-ancestors` est IGNORE dans une balise meta (spec CSP) — l'anti-
         framing reste porte par le header X-Frame-Options (frontend/nginx.conf
         + backend/nginx/nginx.conf). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: http: https:; connect-src 'self' http: https:; frame-src 'self' http: https:; object-src 'self'; base-uri 'self';" />
    <!-- Favicon = même glyphe « O » soleil-éclair que l'icône PWA. .ico pour
         Windows/onglet hérité, .svg pour les navigateurs modernes, PNG 16/32
         en repli. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TAQINOR — ERP Agentique</title>
    <!-- Sora (police Landing uniquement) N'EST PLUS chargée ici (VX57) : elle
         bloquait le rendu de CHAQUE écran (dont /login) pour une police
         utilisée seulement par /landing. Importée depuis Landing.jsx à la
         place — Vite la rattache au chunk lazy de la page. -->
    <!-- Polices de marque de la refonte UI (F16) : Archivo (titres) + Hanken
         Grotesk (corps). Préchargées pour éviter le flash de texte sans style. -->
    <link rel="preload" href="/fonts/hanken-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/archivo-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/brand.css" />

    <!-- PWA : couleur de barre + installation « app » plein écran.
         VX82 — deux balises `media`-ciblées (le chrome OS restait navy autour
         d'une app CLAIRE sans ça) : sombre par défaut/mode sombre, claire en
         `prefers-color-scheme: light` — la première balise `media`
         correspondante l'emporte, celle sans `media` sert de repli pour les
         navigateurs qui ignorent `prefers-color-scheme` sur `theme-color`. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="L’ERP solaire de Taqinor : devis, CRM, stock et facturation." />
    <!-- iOS ignore une partie du manifeste : balises dédiées ci-dessous -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Taqinor" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />

    <!-- Écrans de démarrage iOS (logo officiel Taqinor sur le navy de marque).
         Générés par frontend/scripts/gen_brand_assets.py ; une balise par
         résolution d'iPhone courante (iOS ignore une requête non concordante). -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-750x1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-828x1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1125x2436.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1242x2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1284x2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1179x2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1290x2796.png" />

    <!-- Finitions iOS « app installée » (M157). Style en ligne (chargé avant le
         CSS de l'app) pour que le comportement de défilement soit correct dès la
         toute première peinture, y compris hors connexion sur la page offline :
         • overscroll-behavior: contain → coupe le « rubber-band » qui débordait
           jusqu'au fond de page et le tirer-pour-rafraîchir parasite en mode
           plein écran (standalone) ;
         • -webkit-overflow-scrolling: touch → défilement inertiel natif iOS.
         Additif et non destructif : ne fixe que ces deux propriétés sur la
         racine, le reste de la mise en page vient de src/index.css. -->
    <style>
      html, body {
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
