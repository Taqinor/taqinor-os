server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing : React Router gere les URLs cote client
    # Nginx renvoie toujours index.html pour que React prenne la main
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long sur les assets immutables (JS/CSS avec hash Vite)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache court sur les images et icones
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Desactive les logs pour les health checks
    location = /favicon.ico { log_not_found off; access_log off; }
}
