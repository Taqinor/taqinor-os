server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # VX200 — Defense en profondeur : ce serveur n'est normalement joignable
    # que via le proxy_pass du nginx principal (backend/nginx/nginx.conf, qui
    # pose deja la vraie CSP par environnement + tous les headers) — jamais
    # publie directement (docker-compose.yml n'expose que le port interne).
    # Si ce conteneur est un jour atteint hors de ce proxy, il ne doit pas
    # rester sans AUCUN header (avant VX200 : zero add_header ici).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # index.html NE DOIT JAMAIS etre mis en cache durablement : il reference les
    # bundles JS/CSS par hash. Sans cet en-tete, le navigateur applique un cache
    # heuristique et continue de charger les ANCIENS hash apres un deploiement ->
    # "c'est deploye mais l'ancienne version s'affiche". On force une revalidation
    # a chaque chargement (ETag -> 304 si inchange, donc quasi gratuit) : un
    # nouveau deploiement est pris en compte immediatement. Le service worker PWA
    # (sw.js) et le manifeste sont revalides pour la meme raison (sinon une app
    # installee resterait bloquee sur un ancien shell). On utilise des locations
    # EXACTES (=) : elles priment sur le bloc regex des assets js/css plus bas.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /sw.js { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /registerSW.js { add_header Cache-Control "no-cache"; }

    # SPA routing : React Router gere les URLs cote client
    # Nginx renvoie toujours index.html pour que React prenne la main
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache long sur les assets immutables (JS/CSS avec hash Vite)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache court sur les images et icones
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Desactive les logs pour les health checks
    location = /favicon.ico { log_not_found off; access_log off; }
}
